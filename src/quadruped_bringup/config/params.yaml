# ==============================================================================
# Quadruped Robot — Parameter Configuration
# ==============================================================================
# This file is loaded by robot.launch.py and fed to all nodes that accept it.
# Node-specific parameters are namespaced under the node name.

# ---- strategy_manager_node ----
strategy_manager_node:
  ros__parameters:
    control_frequency: 100.0   # Hz — main loop rate
    gait_type: "trot"          # trot | walk | bound | pace
    max_linear_velocity: 0.5   # m/s
    max_angular_velocity: 1.0  # rad/s

