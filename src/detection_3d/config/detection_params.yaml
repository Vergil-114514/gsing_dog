# ============================================
# YOLO Detector Parameters (CPU-optimized)
# ============================================
yolo_detector:
  ros__parameters:

    confidence_threshold: 0.5
    input_topic: "/camera/color/image_raw"
    publish_annotated_image: true
    publish_detections_topic: "/detection/detections_2d"
    publish_annotated_topic: "/detection/annotated_image"
    infer_size: 640
    skip_frames: 0

# ============================================
# 3D Detection Calculator Parameters
# ============================================
detection_3d_calculator:
  ros__parameters:
    depth_scale: 0.001
    sync_slop: 1.0
    depth_roi_size: 5
    camera_frame: "camera_link"
    depth_topic: "/camera/depth/image_raw"
    detection_topic: "/detection/detections_2d"
    camera_info_topic: "/camera/depth/camera_info"
    publish_detections_3d_topic: "/detection/detections_3d"
    publish_markers_topic: "/detection/markers"
    # Resolution of the source RGB image used for YOLO inference
    source_image_width: 640
    source_image_height: 480
    max_depth_m: 10.0

# ============================================
# Arm Serial Bridge Parameters
# ============================================
arm_serial_bridge:
  ros__parameters:
    serial_port: "auto"
    baud_rate: 115200
    send_rate: 10.0
    detection_topic: "/detection/detections_3d"
    target_class: ""
    ema_alpha: 0.25
    stable_radius_m: 0.02
    stable_frames: 3
    max_send_rate: 3.0
    read_feedback: true

    # Place target in camera frame (fixed index)
    # Flat array: [x1, y1, z1,  x2, y2, z2, ...]
    place_targets_m: [0.0, 0.0, 0.0]
    place_target_index: 0
